# nginx/nginx.conf
# Production Nginx config for LinkedIn-Clone API
# Handles: load balancing, WebSocket upgrade, rate limiting, SSL termination

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Basic settings ─────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Hide nginx version

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Upstream: round-robin across 3 API replicas ────────────────────────────
    upstream api_backend {
        least_conn;                      # least-connections for even distribution
        server api:5000;                 # Docker Compose service (resolves all replicas)
        keepalive 32;                    # reuse connections to upstream
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.yourapp.com;

        # ── SSL ──────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Body size ─────────────────────────────────────────────────────────
        client_max_body_size 20M;

        # ── Auth endpoints (strict rate limiting) ─────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api_backend;
            include /etc/nginx/proxy_params;
        }

        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_backend;
            include /etc/nginx/proxy_params;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://api_backend;
            access_log off;
        }

        # ── Socket.IO (WebSocket + long-poll) ────────────────────────────────
        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;   # Keep WS alive
            proxy_send_timeout 86400s;
        }
    }
}
